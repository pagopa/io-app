name: Actions to setup environment for all workflows
description: "This action collects the steps to setup any job"
inputs:
  generate-api:
    description: "Whether to generate API clients and upload the artifact"
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - uses: ./.github/actions/setup-pnpm
    - name: Cache Nx
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
      with:
        path: .nx
        key: ${{ runner.os }}-nx-cache-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-nx-cache-
    - id: generate-api-client
      if: inputs.generate-api == 'true'
      run: pnpm nx run main-app:generate
      shell: bash
    - id: upload-clients-artifact
      if: inputs.generate-api == 'true'
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: api-client
        path: apps/main-app/definitions/
