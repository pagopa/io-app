name: Release iOS app

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref (tag/branch/sha) to check out and build
        required: true
        type: string
      environment:
        description: GitHub environment to run the job under
        required: true
        type: string
      fastlane-lane:
        description: Fastlane lane used to build & submit the app to TestFlight
        required: true
        type: string
      release-ipa-label:
        description: Label used for the IPA when attached to the GitHub release
        required: true
        type: string

permissions:
  contents: write

jobs:
  release-ios:
    name: Release iOS app on App Store
    environment: ${{ inputs.environment }}
    runs-on: macos-26-xlarge
    steps:
      - id: set-xcode-version
        run: sudo xcode-select -s '/Applications/Xcode_26.2.0.app/Contents/Developer'
        shell: bash
      - id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
      - uses: ./.github/actions/setup-pnpm
      - id: download-api-client
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: api-client
          path: apps/main-app/definitions/
      - id: setup-ruby
        uses: ruby/setup-ruby@e65c17d16e57e481586a6a5a0282698790062f92 # v1.300.0
        with:
          bundler-cache: true
          working-directory: apps/main-app
      - id: prepare-ios-build
        run: |
          cd apps/main-app
          ./scripts/ios-release-build.sh
        env:
          APP_STORE_API_KEY_ID: ${{secrets.APP_STORE_API_KEY_ID}}
          APP_STORE_API_PRIVATE_KEY: ${{secrets.APP_STORE_API_PRIVATE_KEY}}
      - id: add-ssh-deploy-key
        run: |
          echo -e "Host github.com
            AddKeysToAgent yes
            IdentityFile ~/.ssh/id_ed25519" > ~/.ssh/config
          echo -e "$SSH_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 400 ~/.ssh/id_ed25519
          ssh-add ~/.ssh/id_ed25519
        env:
          SSH_DEPLOY_KEY: ${{secrets.SSH_CERTS_DEPLOY_KEY}}
      - id: build-upload-app-store
        name: Build & submit to App store
        run: |
          cd apps/main-app/ios
          bundle exec fastlane ${{ inputs.fastlane-lane }}
        env:
          LC_ALL: en_US.UTF-8
          LANG: en_US.UTF-8
          APP_STORE_API_KEY_ID: ${{secrets.APP_STORE_API_KEY_ID}}
          APP_STORE_API_PRIVATE_KEY: ${{secrets.APP_STORE_API_PRIVATE_KEY}}
          APP_STORE_API_KEY_ISSUER_ID: ${{secrets.APP_STORE_API_KEY_ISSUER_ID}}
          ITMSTRANSPORTER_FORCE_ITMS_PACKAGE_UPLOAD: ${{secrets.ITMSTRANSPORTER_FORCE_ITMS_PACKAGE_UPLOAD}}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      - id: upload-dsym-files
        # Sometimes the build-upload-app-store step fails for timeout,
        # in this case we want to upload the dSYM files anyway
        if: ${{ always() }}
        # We don't want to fail whole job if the dSYM upload step fails
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: IO.app.dSYM.zip
          path: apps/main-app/ios/IO.app.dSYM.zip
      - id: upload-ipa
        # We don't want to fail whole job if the IPA upload step fails
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: IO.ipa
          path: apps/main-app/ios/IO.ipa
      - id: upload-ipa-release
        continue-on-error: true
        run: |
          cd apps/main-app
          APP_VERSION=$(node -p -e "require('./package.json').version")
          gh release upload $APP_VERSION "ios/IO.ipa#$RELEASE_IPA_LABEL"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_IPA_LABEL: ${{ inputs.release-ipa-label }}
