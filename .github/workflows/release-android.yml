name: Release Android app

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref (tag/branch/sha) to check out and build
        required: true
        type: string
      environment:
        description: GitHub environment to run the job under
        required: true
        type: string
      fastlane-build-lane:
        description: Fastlane lane used to build & upload the app to the Play Store
        required: true
        type: string
      fastlane-download-lane:
        description: Fastlane lane used to download the universal APK from the Play Store
        required: true
        type: string
      universal-apk-filename:
        description: File name of the generated universal APK
        required: true
        type: string
      bundle-output-path:
        description: Path to the generated AAB file
        required: true
        type: string
      bundle-artifact-name:
        description: Name used to upload the AAB as a workflow artifact
        required: true
        type: string
      release-aab-label:
        description: Label used for the AAB when attached to the GitHub release
        required: true
        type: string

permissions:
  contents: write
  actions: read

jobs:
  release-android:
    name: Release Android app on Play Store
    environment: ${{ inputs.environment }}
    runs-on: ubuntu-24.04
    steps:
      - id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ inputs.ref }}
      - id: free-up-disk-space
        run: |
          echo "Before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          docker system prune -af || true
          sudo apt-get clean || true
          echo "After cleanup:"
          df -h
      - uses: ./.github/actions/setup-pnpm
      - id: download-api-client
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: api-client
          path: apps/main-app/definitions/
      - id: setup-ruby
        uses: ruby/setup-ruby@e65c17d16e57e481586a6a5a0282698790062f92 # v1.300.0
        with:
          bundler-cache: true
          working-directory: apps/main-app
      - id: build-release-android
        run: |
          cd apps/main-app
          ./scripts/android-release.sh ./android/app
          cd android && bundle exec fastlane ${{ inputs.fastlane-build-lane }}
        shell: bash
        env:
          ENCODED_IOAPP_GOOGLE_SERVICES_JSON_FILE: ${{secrets.ENCODED_IOAPP_GOOGLE_SERVICES_JSON_FILE}}
          ENCODED_IOAPP_JSON_KEY_FILE: ${{secrets.ENCODED_IOAPP_JSON_KEY_FILE}}
          ENCODED_IO_APP_RELEASE_KEYSTORE: ${{secrets.ENCODED_IO_APP_RELEASE_KEYSTORE}}
          IO_APP_RELEASE_STORE_FILE: ${{secrets.IO_APP_RELEASE_STORE_FILE}}
          IO_APP_RELEASE_STORE_PASSWORD: ${{secrets.IO_APP_RELEASE_STORE_PASSWORD}}
          IO_APP_RELEASE_KEY_ALIAS: ${{secrets.IO_APP_RELEASE_KEY_ALIAS}}
          IO_APP_RELEASE_KEY_PASSWORD: ${{secrets.IO_APP_RELEASE_KEY_PASSWORD}}
      - id: download-universal-apk-from-store
        # We don't want to fail whole job if the universal APK is not downloaded from the play store
        continue-on-error: true
        run: |
          cd apps/main-app
          ./scripts/android-release.sh ./android/app
          cd android
          VERSION_CODE=$(sed -n 's/.*versionCode \(.*\)/\1/p' "app/build.gradle")
          echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          bundle exec fastlane ${{ inputs.fastlane-download-lane }}
        env:
          ENCODED_IOAPP_JSON_KEY_FILE: ${{secrets.ENCODED_IOAPP_JSON_KEY_FILE}}
          VERSION_CODE: ${{ env.VERSION_CODE }}
      - id: upload-universal-apk
        # We don't want to fail whole job if the universal APK upload step fails
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ inputs.universal-apk-filename }}
          path: apps/main-app/android/${{ inputs.universal-apk-filename }}
      - id: upload-aab
        # We don't want to fail whole job if the AAB upload step fails
        continue-on-error: true
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: ${{ inputs.bundle-artifact-name }}
          path: ${{ inputs.bundle-output-path }}
      - id: upload-android-assets-release
        continue-on-error: true
        run: |
          APP_VERSION=$(node -p -e "require('./apps/main-app/package.json').version")
          gh release upload $APP_VERSION "$BUNDLE_OUTPUT_PATH#$RELEASE_AAB_LABEL" "apps/main-app/android/$UNIVERSAL_APK_FILENAME#$UNIVERSAL_APK_FILENAME"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUNDLE_OUTPUT_PATH: ${{ inputs.bundle-output-path }}
          RELEASE_AAB_LABEL: ${{ inputs.release-aab-label }}
          UNIVERSAL_APK_FILENAME: ${{ inputs.universal-apk-filename }}
