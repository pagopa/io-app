name: Static checks
on:
  - pull_request
  - merge_group
  - workflow_call
permissions:
  contents: read
jobs:
  configure:
    name: Compute shard matrix
    runs-on: ubuntu-latest
    outputs:
      shard_matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: set-matrix
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Count file changed in the PR to determine the number of shards needed
            FILES_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)

            # Logic: 1 shard per 20 files changed
            # (e.g., >= 200 files = 10 shards)
            SHARDS=$(( (FILES_CHANGED / 20) + 1 ))
            [ "$SHARDS" -gt 10 ] && SHARDS=10
          else
            # Default for merge_group or master
            SHARDS=10
          fi

          JSON=$(node -e "console.log(JSON.stringify(Array.from({length: $SHARDS}, (_, i) => i + 1)))")
          echo "matrix={\"shard\":$JSON}" >> $GITHUB_OUTPUT
  static-checks:
    name: Typescript lint and prettier
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-pr-staticcheck-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    steps:
      - id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: ./.github/actions/setup-composite
      - id: run-tsc
        run: yarn tsc:noemit
      - id: run-lint
        run: yarn lint
      - id: run-prettier
        run: yarn prettier:check
  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: [static-checks, configure]
    strategy:
      matrix: ${{ fromJSON(needs.configure.outputs.shard_matrix) }}
    steps:
      - id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: setup
        uses: ./.github/actions/setup-composite
        with:
          generate-api: "false"
      - id: download-api-client
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: api-client
          path: definitions/
      - id: run-test
        run: yarn test:ci --shard=${{ matrix.shard }}/${{ strategy.job-total }}
      - id: upload-coverage
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-${{ matrix.shard }}
          path: coverage/
          retention-days: 1
  codecov:
    name: Codecov
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      deployments: write
    needs: unit-test
    if: always()
    steps:
      - id: download-coverage
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-*
          path: coverage/
      - id: codecov-script
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: coverage/