name: Static checks
on:
  - pull_request
  - merge_group
  - workflow_call
permissions:
  contents: read
jobs:
  static-checks:
    name: Typescript lint and prettier
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: read
      deployments: write
    concurrency:
      group: ${{ github.workflow }}-pr-staticcheck-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    steps:
      - id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: setup
        uses: ./.github/actions/setup-composite
      - name: Sets the base and head SHAs required for `nx affected` command
        uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1
      - id: run-validate
        run: pnpm validate
      - id: codecov-script
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: apps/main-app/coverage/
