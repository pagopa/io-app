name: Static checks
on:
  - pull_request
  - merge_group
  - workflow_call
jobs:
  configure:
    runs-on: ubuntu-latest
    outputs:
      shard_matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@8e5e7e5ab8b370d6c329ec480221332ada57f0ab # v3.5.2
        with:
          fetch-depth: 0
      - id: set-matrix
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Count file changed in the PR to determine the number of shards needed
            FILES_CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | wc -l)
            
            # Logic: 1 shard per 20 files changed
            # (e.g., >= 200 files = 10 shards)
            SHARDS=$(( (FILES_CHANGED / 20) + 1 ))
            [ "$SHARDS" -gt 10 ] && SHARDS=10
          else
            # Default for merge_group or master
            SHARDS=10
          fi
          
          JSON=$(node -e "console.log(JSON.stringify(Array.from({length: $SHARDS}, (_, i) => i + 1)))")
          echo "matrix={\"shard\":$JSON}" >> $GITHUB_OUTPUT
  static-checks:
    name: Typescript lint and prettier
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-pr-staticcheck-${{ github.head_ref || github.run_id }}
      cancel-in-progress: true
    steps:
      - id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: setup
        uses: ./.github/actions/setup-composite
      - id: run-tsc
        run: yarn tsc:noemit
      - id: run-lint
        run: yarn lint
      - id: run-prettier
        run: yarn prettier:check
  unit-test:
    name: Unit tests
    runs-on: ubuntu-latest
    environment: dev
    needs: [static-checks, configure]
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.configure.outputs.shard_matrix) }}
    steps:
      - id: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: setup-node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: ".node-version"
      - id: yarn-cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        env:
          cache-name: cache-node-modules
        with:
          # npm cache files are stored in `~/.npm` on Linux/macOS
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/yarn.lock') }}
      - id: install-packages
        run: yarn install --frozen-lockfile
      - id: download-api-client
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: api-client
          path: definitions/
      - id: run-test
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Checking if lockfile or critical files changed..."

            CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

            echo "$CHANGED_FILES"

            if echo "$CHANGED_FILES" | grep -E 'yarn.lock|package.json' > /dev/null; then
              echo "Dependency change detected → running FULL test suite"

              yarn test:ci \
                --shard=${{ matrix.shard }}/${{ strategy.job-total }}

            else
              echo "No dependency changes → running RELATED tests only"

              yarn test:ci \
                --changedSince=origin/${{ github.base_ref }} \
                --shard=${{ matrix.shard }}/${{ strategy.job-total }} \
                --passWithNoTests
            fi
          else
            echo "Non-PR event → running FULL test suite"

            yarn test:ci \
              --shard=${{ matrix.shard }}/${{ strategy.job-total }}
          fi
      - id: codecov-script        
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}