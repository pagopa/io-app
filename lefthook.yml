pre-commit:
  jobs:
    - name: lint staged files
      run: pnpm lint-staged --allow-empty

pre-push:
  parallel: true
  jobs:
    - name: lint affected projects
      run: pnpm nx affected --target=lint --parallel --nx-bail

    - name: type-check affected projects
      run: pnpm nx affected --target=tsc-noemit --parallel --nx-bail
